name: "Gateway Service Build and Push"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "gateway/**"
  pull_request:
    branches: [main]
    paths:
      - "gateway/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/tomato-gateway-service:latest
